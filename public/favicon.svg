<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">

  <!-- Moldura arredondada preta (igual à logo) -->
  <rect x="5" y="8" width="68" height="68" rx="18" ry="18"
        stroke="#111111" stroke-width="9" fill="none"/>

  <!-- Barra 1 — baixa -->
  <rect x="13" y="57" width="13" height="13" rx="3" fill="#F97316"/>

  <!-- Barra 2 — média -->
  <rect x="30" y="47" width="13" height="23" rx="3" fill="#F97316"/>

  <!-- Barra 3 — alta -->
  <rect x="47" y="37" width="13" height="33" rx="3" fill="#F97316"/>

  <!-- Linha de tendência diagonal laranja -->
  <polyline
    points="16,62 34,50 52,39 88,6"
    stroke="#F97316" stroke-width="8"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cabeça da seta -->
  <polyline
    points="74,2 89,6 85,21"
    stroke="#F97316" stroke-width="8"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"/>

</svg>
